<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- Icon: P letterform with circuit node aesthetic -->
  <g>
    <!-- Outer ring -->
    <circle cx="26" cy="26" r="22" stroke="#10b981" stroke-width="2.5" opacity="0.2"/>
    <!-- Inner filled circle -->
    <circle cx="26" cy="26" r="16" fill="#10b981" opacity="0.12"/>
    <!-- Bold P shape -->
    <path d="M18 14 L18 38 M18 14 L26 14 Q34 14 34 21 Q34 28 26 28 L18 28"
          stroke="#10b981" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Accent dot bottom right of circle -->
    <circle cx="38" cy="36" r="3" fill="#34d399"/>
    <!-- Small node top -->
    <circle cx="26" cy="8" r="2" fill="#10b981" opacity="0.5"/>
    <!-- Connector line top -->
    <line x1="26" y1="10" x2="26" y2="14" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Wordmark: hand-crafted paths for crisp rendering -->
  <!-- "Pak" in emerald -->
  <text x="58" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22"
        font-weight="800"
        letter-spacing="-0.8"
        fill="#10b981">Pak</text>
  <!-- "Tech" in foreground -->
  <text x="101" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22"
        font-weight="800"
        letter-spacing="-0.8"
        fill="#0f172a">Tech</text>
  <!-- "Jobs" lighter weight -->
  <text x="152" y="34"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="-0.5"
        fill="#64748b">Jobs</text>
</svg>
